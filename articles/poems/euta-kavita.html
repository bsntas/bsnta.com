        <header class="post-header">
          <p class="post-eyebrow">कविता &nbsp;/&nbsp; Poem</p>
          <h1 class="post-title nepali">एउटा कविता लेख्न मन लाग्यो</h1>
          <div class="post-meta">
            <span>बसन्त शर्मा</span>
          </div>
        </header>

        <div class="post-poem nepali">

          <p>
            बिहान उठेँ<br>
            मुख धोएँ<br>
            चिया बनाएँ<br>
            अनि बसेँ।
          </p>

          <p>
            झ्यालबाट बाहिर हेरेँ<br>
            आकाश नीलो थियो<br>
            चरा चिरबिराइरहेका थिए<br>
            हावा बगिरहेको थियो।
          </p>

          <p>
            मनमा एउटा भाव उठ्यो<br>
            शब्दहरू खोज्न थालेँ<br>
            कलम उठाएँ<br>
            कागज फैलाएँ।
          </p>

          <p class="post-poem-coda">
            आज मलाई एउटा कविता लेख्न मन लाग्यो।
          </p>

        </div>
